<section class="contact-us">
  <div class="contact-us__wrapper">
    <div class="contact-us__title">
      <h2>Contact Us</h2>
      <p>
        Most calendars are designed for teams. Slate is designed for freelancers
      </p>
    </div>
    <div class="contact-us__content">
      <div class="contact-us__form">
        <form>
          <div class="contact-us__form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="contact-us__form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="contact-us__form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>
          <button class="primary-btn" type="submit">Send</button>
        </form>
      </div>
      <div class="contact-us__details">
        <div class="contact-us__contact-items">
          <div class="contact-us__contact-item">
            <img src="img/location-icon.svg" alt="Address" />
            <p>
              6386 Spring St undefined Anchorage, Georgia 12473 United States
            </p>
          </div>
          <div class="contact-us__contact-item">
            <img src="img/phone-icon.svg" alt="Phone" />
            <p>(843) 555-0130</p>
          </div>
          <div class="contact-us__contact-item">
            <img src="img/email-icon.svg" alt="Email" />
            <p>willie.jennings@example.com</p>
          </div>
        </div>
        <div class="contact-us__map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086803203!2d-122.419415084681!3d37.77492977975971!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c5b8b8b8%3A0x123456789abcdef!2sSan%20Francisco%2C%20CA%2C%20USA!5e0!3m2!1sen!2s!4v1610000000000"
            width="100%"
            height="300"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            >Аlt="Google Map"></iframe
          >
        </div>
        <div class="contact-us__social">
          <a href="#" aria-label="Twitter"
            ><img src="img/ant-design_twitter-outlined.png" alt="Twitter"
          /></a>
          <a href="#" aria-label="Facebook"
            ><img src="img/ant-design_facebook-filled.png" alt="Facebook"
          /></a>
          <a href="#" aria-label="LinkedIn"
            ><img src="img/ant-design_linkedin-filled.png" alt="LinkedIn"
          /></a>
        </div>
      </div>
    </div>
  </div>
</section>
